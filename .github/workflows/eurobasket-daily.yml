name: Eurobasket zajem (30 min)

# Kdaj tece:
on:
  schedule:
    - cron: '0,30 * * * *'   # vsakih 30 minut (ob :00 in :30)
  workflow_dispatch: {}        # gumb za rocni zagon v zavihku Actions

# Workflow mora smeti pisati v repo (commit nazaj)
permissions:
  contents: write

# Ce se prejsnji zagon se ni koncal, ga ne podvajaj — pocakaj/preskoci.
# Tako se zagoni na 30 min nikoli ne prekrivajo.
concurrency:
  group: eurobasket-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Namesti odvisnosti
        run: pip install requests beautifulsoup4 lxml

      # 1) Zajemi Eurobasket -> eb_transfers_latest.json
      - name: Zajem Eurobasket
        run: python eb_scrape.py eb_transfers_latest.json

      # 2) Predelaj -> eurobasket.json + eurobasket_new.json (v transfers_data/)
      - name: Predelava
        run: python process_transfers.py eb_transfers_latest.json

      # 3) Preveri odhode proti RSS novicam (doda verify oznake)
      - name: Verifikacija novic
        run: python verify_transfers.py transfers_data
        continue-on-error: true

      # 3b) Izlusci prestope IZ RSS novic (loceni zavihek v aplikaciji)
      - name: RSS prestopi
        run: python rss_transfers.py transfers_data/rss_transfers.json
        continue-on-error: true

      # 4) Kopiraj rezultata poleg index.html (koren repa)
      - name: Kopiraj JSON poleg strani
        run: |
          cp transfers_data/eurobasket.json     ./eurobasket.json
          cp transfers_data/eurobasket_new.json ./eurobasket_new.json
          cp transfers_data/rss_transfers.json  ./rss_transfers.json || echo "ni rss_transfers.json"

      # 5) Commit nazaj v repo SAMO ce so spremembe.
      #    [skip ci] v sporocilu prepreci morebitne verizne sprozitve.
      - name: Commit & push
        run: |
          git config user.name  "eurobasket-bot"
          git config user.email "actions@github.com"
          git add eurobasket.json eurobasket_new.json rss_transfers.json transfers_data/ 2>/dev/null || git add eurobasket.json eurobasket_new.json transfers_data/
          if git diff --staged --quiet; then
            echo "Ni sprememb — brez commita."
          else
            git commit -m "Auto: Eurobasket prestopi $(date -u +'%Y-%m-%d %H:%M') [skip ci]"
            git push
          fi
