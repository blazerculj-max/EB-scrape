name: Eurobasket dnevni zajem

# Kdaj tece:
on:
  schedule:
    - cron: '0 5 * * *'      # vsak dan ob 05:00 UTC (07:00 po SLO poleti)
  workflow_dispatch: {}        # gumb za rocni zagon v zavihku Actions

# Workflow mora smeti pisati v repo (commit nazaj)
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Namesti odvisnosti
        run: pip install requests beautifulsoup4

      # 1) Zajemi Eurobasket -> eb_transfers_latest.json
      - name: Zajem Eurobasket
        run: python eb_scrape.py eb_transfers_latest.json

      # 2) Predelaj -> eurobasket.json + eurobasket_new.json (v transfers_data/)
      - name: Predelava
        run: python process_transfers.py eb_transfers_latest.json

      # 3) Kopiraj rezultata poleg index.html (koren repa)
      - name: Kopiraj JSON poleg strani
        run: |
          cp transfers_data/eurobasket.json     ./eurobasket.json
          cp transfers_data/eurobasket_new.json ./eurobasket_new.json

      # 4) Commit nazaj v repo (GitHub Pages takoj postrezhe nove podatke)
      - name: Commit & push
        run: |
          git config user.name  "eurobasket-bot"
          git config user.email "actions@github.com"
          git add eurobasket.json eurobasket_new.json transfers_data/
          if git diff --staged --quiet; then
            echo "Ni sprememb."
          else
            git commit -m "Auto: Eurobasket prestopi $(date -u +%Y-%m-%d)"
            git push
          fi
